name: pdf_vault
description: "A Flutter app for unlocking password-protected PDF files."
publish_to: 'none'
version: 1.0.2+3

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  decrypt_pdf: ^0.0.1
  file_picker: ^10.3.3
  flutter_file_dialog: ^3.0.3
  google_fonts: ^6.3.2
  path: ^1.9.1
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
