name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag, for example v1.1.0"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ inputs.tag || github.ref_name }}
  cancel-in-progress: false

env:
  FLUTTER_VERSION: 3.41.7
  RELEASE_TAG: ${{ inputs.tag || github.ref_name }}

jobs:
  validate:
    name: Validate Release Tag
    runs-on: ubuntu-latest

    steps:
      - name: Check out release ref
        uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Validate tag and pubspec version
        run: |
          set -euo pipefail

          if ! [[ "${RELEASE_TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tag must look like v1.2.3; got ${RELEASE_TAG}."
            exit 1
          fi

          pubspec_version="$(awk '/^version:/ { print $2; exit }' pubspec.yaml)"
          app_version="${pubspec_version%%+*}"

          if [ "${RELEASE_TAG}" != "v${app_version}" ]; then
            echo "Tag ${RELEASE_TAG} does not match pubspec version ${pubspec_version}."
            echo "Expected tag v${app_version}."
            exit 1
          fi

  android-release:
    name: Android Release Assets
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Check out release ref
        uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build split release APKs
        run: flutter build apk --release --split-per-abi

      - name: Build release app bundle
        run: flutter build appbundle --release

      - name: Collect Android assets
        run: |
          set -euo pipefail
          mkdir -p dist
          cp build/app/outputs/flutter-apk/*-release.apk dist/
          cp build/app/outputs/bundle/release/app-release.aab "dist/pdf-vault-${RELEASE_TAG}.aab"

      - name: Upload Android assets
        uses: actions/upload-artifact@v7
        with:
          name: android-release-assets
          path: dist/*
          if-no-files-found: error

  ios-release:
    name: iOS Release Assets
    runs-on: macos-latest
    needs: validate

    steps:
      - name: Check out release ref
        uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build unsigned iOS release app
        run: flutter build ios --release --no-codesign

      - name: Package iOS sideload IPA
        run: |
          set -euo pipefail
          rm -rf Payload
          mkdir Payload
          cp -R build/ios/iphoneos/Runner.app Payload/
          zip -qry "pdf-vault-ios-${RELEASE_TAG}.ipa" Payload
          rm -rf Payload

      - name: Collect iOS assets
        run: |
          set -euo pipefail
          mkdir -p dist
          mv "pdf-vault-ios-${RELEASE_TAG}.ipa" dist/
          ditto -c -k --keepParent build/ios/iphoneos/Runner.app "dist/pdf-vault-ios-unsigned-${RELEASE_TAG}.zip"

      - name: Upload iOS asset
        uses: actions/upload-artifact@v7
        with:
          name: ios-release-assets
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - android-release
      - ios-release

    steps:
      - name: Check out release ref
        uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Download release assets
        uses: actions/download-artifact@v7
        with:
          path: dist
          merge-multiple: true

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          ls -la dist

          cat > release-notes.md <<NOTES
          Release ${RELEASE_TAG}

          Android assets are built from the tagged source.

          iOS assets:
          - pdf-vault-ios-${RELEASE_TAG}.ipa: sideload package for AltStore/SideStore/Sideloadly.
          - pdf-vault-ios-unsigned-${RELEASE_TAG}.zip: unsigned Runner.app archive for developers.
          NOTES

          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release upload "${RELEASE_TAG}" dist/* --clobber
          else
            gh release create "${RELEASE_TAG}" dist/* \
              --title "${RELEASE_TAG}" \
              --notes-file release-notes.md \
              --verify-tag
          fi
